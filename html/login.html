<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni Checker</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#6366f1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b1020;
            background-image:
                radial-gradient(at 20% 15%, rgba(99, 102, 241, 0.35) 0, transparent 50%),
                radial-gradient(at 80% 85%, rgba(16, 185, 129, 0.25) 0, transparent 50%),
                radial-gradient(at 50% 50%, rgba(59, 130, 246, 0.15) 0, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 36px 32px;
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .logo {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.35);
        }
        .logo svg { width: 28px; height: 28px; color: #fff; }
        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 28px;
        }
        .field { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            color: #f3f4f6;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }
        input:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        input::placeholder { color: #6b7280; }
        button {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.15s, opacity 0.15s;
            font-family: inherit;
        }
        button:hover:not(:disabled) {
            box-shadow: 0 10px 24px rgba(99, 102, 241, 0.4);
        }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            margin-top: 14px;
            padding: 10px 12px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .error.show { display: block; }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: -2px;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <form class="card" id="loginForm" autocomplete="on">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h1>Вход в систему</h1>
        <p class="subtitle">Uni Checker</p>

        <div class="field">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus spellcheck="false" placeholder="admin">
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
        </div>

        <button type="submit" id="submitBtn">Войти</button>
        <div class="error" id="error"></div>

    </form>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('submitBtn');
        const errBox = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errBox.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Вход…';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });

                if (resp.ok) {
                    window.location.href = '/';
                    return;
                }

                let msg = 'Ошибка входа';
                try {
                    const data = await resp.json();
                    if (data.error) msg = data.error;
                } catch {}
                errBox.textContent = msg;
                errBox.classList.add('show');
            } catch {
                errBox.textContent = 'Сервис авторизации недоступен';
                errBox.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
