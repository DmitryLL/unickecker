upstream auth_backend {
    server auth:5000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Internal endpoint called by auth_request
    location = /_auth/verify {
        internal;
        proxy_pass http://auth_backend/_auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Public login page (no auth)
    location = /login {
        try_files /login.html =404;
    }

    # Favicon (no auth, кэш на сутки)
    location = /favicon.svg {
        access_log off;
        expires 1d;
        try_files /favicon.svg =404;
    }
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # Auth API — proxied to the auth service
    location /api/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Healthcheck (open)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else requires a valid session
    location / {
        auth_request /_auth/verify;
        error_page 401 = @redirect_login;
        try_files $uri $uri/ =404;
    }

    location @redirect_login {
        return 302 /login;
    }
}
